<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Film Trending</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-grid>
    <ion-row>
      <ion-col size="3" size-md="3" size-lg="2" *ngFor="let movie of trendingMovies">
        <ion-card class="ukuran-card" button="true" [routerLink]="['/detail-film', movie.id]" [queryParams]="{ type: 'movie' }">
          <img class="ukuran-gambar" [alt]="movie.title" [src]="getImage(movie.poster_path)" />
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
